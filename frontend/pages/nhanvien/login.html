<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập hệ thống</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0077cc, #00aaff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; margin: 0;
    }
    .login-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }
    .login-card h2 {
      margin-bottom: 20px;
      color: #0077cc;
    }
    .login-card input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .login-card button {
      width: 100%;
      padding: 12px;
      background: #0077cc;
      border: none;
      color: white;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    .login-card button:hover {
      background: #005fa3;
    }
    .error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>Đăng nhập</h2>
    <form id="login-form">
      <input type="text" id="username" placeholder="Tên đăng nhập" required>
      <input type="password" id="password" placeholder="Mật khẩu" required>
      <button type="submit">Đăng nhập</button>
    </form>
    <div class="error" id="error-msg"></div>
  </div>

  <script>
    const form = document.getElementById("login-form");
    const errorMsg = document.getElementById("error-msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.textContent = "";

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("http://localhost:3000/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || "Đăng nhập thất bại!";
          return;
        }

        // ✅ Nếu đăng nhập thành công thì chuyển trang theo role
        if (data.role === "BACSI") {
          window.location.href = "/frontend/pages/nhanvien/quanly/doctor.html";
        } else if (data.role === "LETAN") {
          window.location.href = "/frontend/pages/nhanvien/quanly/reception.html";
        } else if (data.role === "ADMIN") {
          window.location.href = "manage.account.html";
        } else {
          errorMsg.textContent = "Không xác định được vai trò!";
        }

      } catch (err) {
        console.error("Lỗi:", err);
        errorMsg.textContent = "Không kết nối được server!";
      }
    });
  </script>
</body>
</html>
