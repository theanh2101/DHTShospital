<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Đổi mật khẩu - Tối giản</title>
<style>
    /* Định dạng chung */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        /* Nền tối giản, màu trắng hoặc xám nhạt */
        background-color: #f7f9fc; 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    /* Container chính của form */
    .container {
        background-color: #ffffff;
        padding: 40px;
        border-radius: 12px; /* Bo góc vừa phải */
        /* Bóng đổ nhẹ nhàng, tạo cảm giác nổi */
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); 
        width: 100%;
        max-width: 400px;
        border: 1px solid #e0e0e0; /* Viền mỏng, tinh tế */
    }

    h1 {
        /* Màu chữ chính (Primary Color) */
        color: #007bff; 
        text-align: center;
        margin-bottom: 30px;
        font-size: 24px;
        font-weight: 600;
    }

    /* Nhóm input */
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group-password {
        position: relative;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        color: #555;
        font-size: 14px;
    }

    input[type="password"], input[type="text"] {
        width: 100%;
        padding: 12px 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 16px;
        transition: border-color 0.3s, box-shadow 0.3s;
    }

    input[type="password"]:focus, input[type="text"]:focus {
        border-color: #007bff;
        outline: none;
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.2); /* Hiệu ứng focus nhẹ */
        background-color: #ffffff;
    }

    /* Biểu tượng con mắt */
    .toggle-password {
        position: absolute;
        top: 38px; 
        right: 12px;
        cursor: pointer;
        color: #a0a0a0;
        transition: color 0.3s;
        z-index: 10;
    }

    .toggle-password:hover {
        color: #007bff;
    }

    /* Nút Quay lại */
    .btn-secondary {
        width: 100%;
        padding: 12px;
        background-color: #f0f0f0; /* Màu nền xám nhạt */
        color: #555; /* Màu chữ đậm */
        border: 1px solid #ccc;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 10px;
        transition: background-color 0.3s, transform 0.1s;
    }

    .btn-secondary:hover {
        background-color: #e0e0e0;
        transform: translateY(-1px);
    }

    /* Nút Submit chính (Đổi mật khẩu) */
    button[type="submit"] {
        width: 100%;
        padding: 12px;
        background-color: #28a745; /* Màu xanh lá cây thành công (Success) */
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 17px;
        font-weight: 600;
        box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        transition: background-color 0.3s, transform 0.1s, box-shadow 0.3s;
    }

    button[type="submit"]:hover {
        background-color: #218838;
        transform: translateY(-1px);
        box-shadow: 0 6px 12px rgba(40, 167, 69, 0.4);
    }

    button[type="submit"]:active {
        transform: translateY(1px);
    }

    /* Thông báo */
    #message {
        margin-top: 20px;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-weight: bold;
        display: none;
        word-wrap: break-word;
    }
    .success-msg {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }
    .error-msg {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Đổi Mật Khẩu Tài Khoản</h1>
    <form id="form-change">
        <p style="text-align: center; color: #888; font-size: 14px; margin-bottom: 25px;">
            <i>Vui lòng nhập chính xác thông tin để cập nhật mật khẩu.</i>
        </p> 

        <div class="form-group form-group-password">
            <label for="oldPassword">Mật khẩu cũ</label>
            <input id="oldPassword" type="password" required minlength="6" placeholder="Nhập mật khẩu cũ" />
            <span class="toggle-password" onclick="togglePasswordVisibility('oldPassword')">
                <svg id="eye-oldPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.08 2.88"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </span>
        </div>
        
        <div class="form-group form-group-password">
            <label for="newPassword">Mật khẩu mới</label>
            <input id="newPassword" type="password" required minlength="6" placeholder="Nhập mật khẩu mới" />
            <span class="toggle-password" onclick="togglePasswordVisibility('newPassword')">
                <svg id="eye-newPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.08 2.88"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </span>
        </div>
        
        <div class="form-group form-group-password">
            <label for="confirmNewPassword">Xác nhận mật khẩu mới</label>
            <input id="confirmNewPassword" type="password" required minlength="6" placeholder="Xác nhận mật khẩu mới" />
            <span class="toggle-password" onclick="togglePasswordVisibility('confirmNewPassword')">
                <svg id="eye-confirmNewPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.08 2.88"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </span>
        </div>
        
        <div id="message"></div>
        
        <button type="button" class="btn-secondary" onclick="goBack()">
            Quay lại
        </button>
        
        <button type="submit">Đổi mật khẩu</button>
    </form>
</div>

<script>
const API_URL = "http://localhost:3000/api";
const USER_ID_STORAGE_KEY = 'id_taikhoan'; 

const form = document.getElementById("form-change");
const oldPasswordInput = document.getElementById("oldPassword");
const newPasswordInput = document.getElementById("newPassword");
const confirmNewPasswordInput = document.getElementById("confirmNewPassword");
const messageDiv = document.getElementById("message");

function displayMessage(msg, isSuccess = false) {
    messageDiv.style.display = 'block';
    messageDiv.textContent = msg;
    messageDiv.className = isSuccess ? 'success-msg' : 'error-msg';
}

function togglePasswordVisibility(inputId) {
    const input = document.getElementById(inputId);
    const toggleElement = document.getElementById(`eye-${inputId}`);
    const isPassword = input.type === 'password';

    input.type = isPassword ? 'text' : 'password';

    if (isPassword) {
        // Hiện mật khẩu: con mắt mở
        toggleElement.outerHTML = `
            <svg id="eye-${inputId}" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
        `;
    } else {
        // Ẩn mật khẩu: con mắt gạch ngang
        toggleElement.outerHTML = `
            <svg id="eye-${inputId}" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.08 2.88"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        `;
    }
}

function goBack() {
    // Quay lại trang trước đó trong lịch sử trình duyệt
    window.history.back();
}


form.addEventListener("submit", async e => {
    e.preventDefault();
    messageDiv.style.display = 'none';

    // 1. Lấy ID tài khoản từ LocalStorage
    let id_taikhoan = null;
    const userString = localStorage.getItem("user");

    if (userString) {
        try {
            const userObject = JSON.parse(userString);
            id_taikhoan = userObject.id;
        } catch (e) {
            console.error("Lỗi parse JSON từ Local Storage:", e);
            displayMessage("Lỗi đọc thông tin người dùng từ bộ nhớ cục bộ.", false);
            return;
        }
    } else {
        displayMessage("Bạn chưa đăng nhập. Vui lòng đăng nhập lại.", false);
        return;
    }
    
    const oldPassword = oldPasswordInput.value;
    const newPassword = newPasswordInput.value;
    const confirmNewPassword = confirmNewPasswordInput.value;
    
    if (!id_taikhoan) {
        displayMessage("Không tìm thấy ID tài khoản để thực hiện đổi mật khẩu.");
        return;
    }

    // 2. Client-side Validation
    if (newPassword.length < 6) {
        displayMessage("Mật khẩu phải có ít nhất 6 ký tự.");
        return;
    }

    if (newPassword !== confirmNewPassword) {
        displayMessage("Mật khẩu mới và Xác nhận mật khẩu mới không khớp.");
        return;
    }
    
    if (oldPassword === newPassword) {
        displayMessage("Mật khẩu mới phải khác mật khẩu cũ.");
        return;
    }

    // 3. Gửi yêu cầu API
    try {
        const res = await fetch(`${API_URL}/auth/change-password`, {
            method: "POST",
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ id_taikhoan, oldPassword, newPassword })
        });

        if (!res.ok) {
            const errorData = await res.json().catch(() => ({ message: `Lỗi Server không rõ (Mã: ${res.status})` }));
            displayMessage(errorData.message || `Lỗi đổi mật khẩu (Mã: ${res.status})`);
            return;
        }
        
        const data = await res.json();
        
        if (data.success) {
            displayMessage("Đổi mật khẩu thành công! Vui lòng đăng nhập lại.", true);
            form.reset(); 
            localStorage.removeItem("user");
            
            setTimeout(() => { 
                // Chuyển hướng về trang đăng nhập nếu cần
                // window.location.href = '/login.html'; 
            }, 3000); 
            
        } else {
            displayMessage(data.message || `Lỗi đổi mật khẩu.`);
        }
    } catch (error) {
        console.error('Lỗi mạng hoặc Server:', error);
        displayMessage('Không thể kết nối đến Server.');
    }
});
</script>
</body>
</html>
