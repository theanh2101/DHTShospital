<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Đổi mật khẩu</title>
</head>
<body>
<h1>Đổi mật khẩu</h1>
<form id="form-change">
  <div>
    <label>ID tài khoản (id_taikhoan):</label>
    <input id="id_taikhoan" required />
  </div>
  <div>
    <label>Mật khẩu cũ</label>
    <input id="oldPassword" type="password" required />
  </div>
  <div>
    <label>Mật khẩu mới</label>
    <input id="newPassword" type="password" required />
  </div>
  <button type="submit">Đổi mật khẩu</button>
</form>
<script>
const API_URL = "http://localhost:3000/api";
document.getElementById("form-change").addEventListener("submit", async e=>{
  e.preventDefault();
  const id_taikhoan = document.getElementById("id_taikhoan").value.trim();
  const oldPassword = document.getElementById("oldPassword").value;
  const newPassword = document.getElementById("newPassword").value;
  const res = await fetch(`${API_URL}/auth/change-password`, {
    method: "POST",
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id_taikhoan, oldPassword, newPassword })
  });
  const data = await res.json();
  if (data.success) {
    alert("Đổi mật khẩu thành công");
    // bạn có thể redirect về login
  } else {
    alert(data.message || 'Lỗi đổi mật khẩu');
  }
});
</script>
</body>
</html>
