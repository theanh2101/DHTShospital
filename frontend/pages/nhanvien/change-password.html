<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Đổi mật khẩu</title>
<style>
    /* Định dạng chung */
    body {
        font-family: 'Arial', sans-serif;
        background-color: #f4f7f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    /* Container chính của form */
    .container {
        background-color: #ffffff;
        padding: 30px 40px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
    }

    h1 {
        color: #007bff;
        text-align: center;
        margin-bottom: 30px;
        font-size: 24px;
        font-weight: 600;
    }

    /* Nhóm input */
    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #333;
    }

    input[type="password"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 16px;
        transition: border-color 0.3s;
    }

    input[type="password"]:focus {
        border-color: #007bff;
        outline: none;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.2);
    }

    /* Nút Submit */
    button {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        transition: background-color 0.3s, transform 0.1s;
    }

    button:hover {
        background-color: #0056b3;
    }

    button:active {
        transform: translateY(1px);
    }

    /* Thông báo */
    #message {
        margin-top: 20px;
        padding: 12px;
        border-radius: 6px;
        text-align: center;
        font-weight: bold;
        display: none;
        word-wrap: break-word; /* Đảm bảo tin nhắn dài không tràn ra ngoài */
    }
    .success-msg {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }
    .error-msg {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Đổi Mật Khẩu Tài Khoản</h1>
    <form id="form-change">
        <p style="text-align: center; color: #6c757d; font-size: 14px;">
            <i>ID tài khoản sẽ được lấy từ phiên đăng nhập.</i>
        </p> 

        <div class="form-group">
            <label for="oldPassword">Mật khẩu cũ</label>
            <input id="oldPassword" type="password" required minlength="6" placeholder="Nhập mật khẩu cũ" />
        </div>
        
        <div class="form-group">
            <label for="newPassword">Mật khẩu mới</label>
            <input id="newPassword" type="password" required minlength="6" placeholder="Nhập mật khẩu mới" />
        </div>
        
        <div class="form-group">
            <label for="confirmNewPassword">Xác nhận mật khẩu mới</label>
            <input id="confirmNewPassword" type="password" required minlength="6" placeholder="Xác nhận mật khẩu mới" />
        </div>
        
        <div id="message"></div>
        
        <button type="submit">Đổi mật khẩu</button>
    </form>
</div>

<script>
const API_URL = "http://localhost:3000/api";
const USER_ID_STORAGE_KEY = 'id_taikhoan'; // Tên key trong localStorage

const form = document.getElementById("form-change");
const oldPasswordInput = document.getElementById("oldPassword");
const newPasswordInput = document.getElementById("newPassword");
const confirmNewPasswordInput = document.getElementById("confirmNewPassword");
const messageDiv = document.getElementById("message");

function displayMessage(msg, isSuccess = false) {
    messageDiv.style.display = 'block';
    messageDiv.textContent = msg;
    // Thay đổi class để áp dụng màu sắc/nền đẹp hơn
    messageDiv.className = isSuccess ? 'success-msg' : 'error-msg';
}

form.addEventListener("submit", async e => {
    e.preventDefault();
    messageDiv.style.display = 'none';

    // 1. Lấy ID tài khoản từ LocalStorage
    let id_taikhoan = null;
    const userString = localStorage.getItem("user");

if (userString) {
    try {
        const userObject = JSON.parse(userString);
        id_taikhoan = userObject.id;
        // Cập nhật thông tin Lễ tân vào Modal (Tùy chọn)
        document.getElementById("lt_hoten").textContent = userObject.ho_ten || 'N/A';
        document.getElementById("lt_sdt").textContent = userObject.phone || 'N/A';
        document.getElementById("lt_email").textContent = userObject.email || 'N/A';
        document.getElementById("lt_id").textContent = userObject.id_letan || userObject.id; 
        document.getElementById("lt_tk").textContent = userObject.username || 'N/A';
    } catch (e) {
        console.error("Lỗi parse JSON từ Local Storage:", e);
    }
} else {
    console.log("Không tìm thấy thông tin Lễ tân.");
    // Thêm logic redirect nếu cần
}
    
    const oldPassword = oldPasswordInput.value;
    const newPassword = newPasswordInput.value;
    const confirmNewPassword = confirmNewPasswordInput.value;
    

    // 2. Client-side Validation
    if (newPassword.length < 6) {
        displayMessage("Mật khẩu phải có ít nhất 6 ký tự.");
        return;
    }

    if (newPassword !== confirmNewPassword) {
        displayMessage("Mật khẩu mới và Xác nhận mật khẩu mới không khớp.");
        return;
    }
    
    if (oldPassword === newPassword) {
        displayMessage("Mật khẩu mới phải khác mật khẩu cũ.");
        return;
    }

    // 3. Gửi yêu cầu API
    try {
        const res = await fetch(`${API_URL}/auth/change-password`, {
            method: "POST",
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ id_taikhoan, oldPassword, newPassword })
        });

        const data = await res.json();
        
        if (res.ok && data.success) {
            displayMessage("Đổi mật khẩu thành công! Vui lòng đăng nhập lại.", true);
            form.reset(); 
            // Bảo mật: Xóa ID/token khỏi localStorage
            localStorage.removeItem(USER_ID_STORAGE_KEY);
            // Có thể thêm setTimeout để chuyển hướng sau 3 giây
            // setTimeout(() => { window.location.href = '/login.html'; }, 3000); 
            
        } else {
            // Lỗi xác thực (ví dụ: mật khẩu cũ sai) hoặc lỗi server
            displayMessage(data.message || `Lỗi đổi mật khẩu (Mã: ${res.status})`);
        }
    } catch (error) {
        console.error('Lỗi mạng hoặc Server:', error);
        displayMessage('Không thể kết nối đến Server.');
    }
});
</script>
</body>
</html>
