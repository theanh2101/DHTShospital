<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý bác sĩ - DHST Hospital</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{
            --primary:#2563eb; --accent:#38bdf8; --bg:#f9fafb; --card:#fff;
            --text:#1e293b; --muted:#6b7280; --radius:14px; --shadow:0 10px 30px rgba(0,0,0,0.08);
        }
        *{box-sizing:border-box;font-family:"Inter",sans-serif;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);}

        /* Main Content - Căn lề trái để tránh Sidebar (do sidebar.html dùng position:fixed) */
        .main {
            margin-left: 250px; /* Khớp với width của sidebar */
            padding: 32px;
            min-height: 100vh;
            transition: margin-left .3s;
        }

        header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
        header h1{font-size:26px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:10px;}
        header .small{color:var(--muted);}

        .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
        padding:26px;margin-bottom:30px;animation:fadeIn .4s ease;}
        .card h2{font-size:18px;color:var(--text);display:flex;align-items:center;gap:10px;}
        .card h2 i{color:var(--primary);}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

        .table-wrap{overflow-x:auto;margin-top:16px;}
        table{width:100%;border-collapse:collapse;}
        thead th{background:linear-gradient(90deg,var(--primary),#1e40af);color:#fff;
        padding:12px 16px;text-align:left;font-weight:600;}
        tbody td{padding:12px 16px;border-bottom:1px solid #f1f5f9;}
        tr:hover td{background:#f8fafc;}

        /* Thanh chức năng */
        .card-header {
            display:flex; justify-content:space-between; align-items:center;
            flex-wrap:wrap; gap:10px; margin-bottom:10px;
        }
        .actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        select, input {
            padding:10px 12px; border:1px solid #e2e8f0; border-radius:10px; font-size:14px;
        }
        select { min-width:180px; }
        input { width:220px; }
        .btn-search {
            background:var(--primary); color:#fff; border:none; border-radius:10px;
            padding:10px 14px; cursor:pointer; transition:.25s;
            display:flex; align-items:center; justify-content:center;
        }
        .btn-search:hover { opacity:0.9; transform:translateY(-2px); }

        /* Responsive */
        @media (max-width: 900px) {
            .main { margin-left: 0; padding: 20px; }
            #sidebar-placeholder { display: none; } /* Hoặc xử lý menu mobile nếu cần */
        }
    </style>
</head>
<body>

    <div id="sidebar-placeholder"></div>

    <main class="main">
        <header>
            <h1><i class="fas fa-user-md"></i> Quản lý bác sĩ</h1>
            <div class="small">Xin chào, Admin  👋 </div>
        </header>

        <section class="card">
            <div class="card-header">
                <h2><i class="fas fa-list"></i> Danh sách bác sĩ</h2>
                <div class="actions">
                    <select id="filterKhoa">
                        <option value="">-- Tất cả khoa --</option>
                    </select>
                    <input id="searchInput" type="text" placeholder="Nhập mã hoặc tên bác sĩ...">
                    <button id="searchBtn" class="btn-search"><i class="fas fa-search"></i></button>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:90px">Mã BS</th>
                            <th>Họ và tên</th>
                            <th>Khoa</th>
                            <th>Học vị</th>
                            <th>Chức vụ</th>
                        </tr>
                    </thead>
                    <tbody id="doctorTbody"><tr><td colspan="5">Đang tải...</td></tr></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_DOCTOR = "http://localhost:3000/api/listdoctor";
        const API_KHOA = "http://localhost:3000/api/khoa";
        const tbody = document.getElementById("doctorTbody");
        const searchInput = document.getElementById("searchInput");
        const filterKhoa = document.getElementById("filterKhoa");
        const searchBtn = document.getElementById("searchBtn");
        let allDoctors = [];

        // ================= SIDEBAR LOADER =================
        async function loadSidebar() {
            try {
                const res = await fetch('sidebar.html');
                if (res.ok) {
                    const html = await res.text();
                    document.getElementById('sidebar-placeholder').innerHTML = html;
                    initSidebarEvents(); // Gắn sự kiện sau khi HTML được chèn
                }
            } catch (err) {
                console.error("Lỗi tải sidebar:", err);
            }
        }

        function initSidebarEvents() {
            // 1. Xử lý Toggle Submenu (Quản lý nhân viên)
            const toggle = document.getElementById("toggleNhanVien");
            if (toggle) {
                toggle.onclick = (e) => {
                    e.preventDefault();
                    const group = toggle.closest(".submenu-group");
                    const submenu = group.querySelector(".submenu");
                    submenu.classList.toggle("show");
                    group.classList.toggle("open");
                };
            }

            // 2. Xử lý Đăng xuất
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.onclick = () => {
                    if (confirm("Bạn có chắc chắn muốn đăng xuất không?")) {
                        localStorage.clear();
                        sessionStorage.clear();
                        window.location.href = "../login.html";
                    }
                };
            }

            // 3. Highlight Active Link & Mở Submenu cha
            const currentPath = "manage.bacsi.html"; // Tên file hiện tại
            const links = document.querySelectorAll('.nav a, .submenu a');
            
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && href.includes(currentPath)) {
                    // Active chính link này
                    link.classList.add('active');
                    
                    // Nếu nằm trong submenu, hãy mở submenu cha ra
                    const submenu = link.closest('.submenu');
                    if (submenu) {
                        submenu.classList.add('show');
                        const group = submenu.closest('.submenu-group');
                        if (group) {
                            group.classList.add('open');
                            // Active luôn cả nút toggle cha nếu muốn
                            // group.querySelector('#toggleNhanVien').classList.add('active'); 
                        }
                    }
                }
            });
        }

        // ================= BUSINESS LOGIC (Giữ nguyên) =================
        
        // Load danh sách khoa
        async function loadKhoa() {
            try {
                const res = await fetch(API_KHOA);
                const list = await res.json();
                list.forEach(k => {
                    const opt = document.createElement("option");
                    opt.value = k.ten_khoa;
                    opt.textContent = k.ten_khoa;
                    filterKhoa.appendChild(opt);
                });
            } catch (err) { console.error(err); }
        }

        // Load danh sách bác sĩ
        async function loadDoctors() {
            try {
                const res = await fetch(API_DOCTOR);
                const result = await res.json();
                allDoctors = result.data || result || [];
                renderDoctors(allDoctors);
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5">Không thể tải dữ liệu.</td></tr>`;
            }
        }

        // Render bảng
        function renderDoctors(list) {
            tbody.innerHTML = "";
            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="5">Không tìm thấy bác sĩ nào.</td></tr>`;
                return;
            }
            list.forEach(bs => {
                const id = bs.id_bacsi || "N/A";
                const name = bs.hoten || bs.ho_ten || "N/A";
                const dept = bs.tenkhoa || bs.ten_khoa || "N/A";
                const degree = bs.hocvi || bs.hoc_vi || "N/A";
                const position = bs.chucvu || bs.chuc_vu || "N/A";
                
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${id}</td>
                    <td>${name}</td>
                    <td>${dept}</td>
                    <td>${degree}</td>
                    <td>${position}</td>`;
                tr.style.cursor = "pointer";
                tr.onclick = () => window.location.href = `chitiet.bacsi.html?id=${id}`;
                tbody.appendChild(tr);
            });
        }

        // Lọc và Tìm kiếm
        function filterData() {
            const keyword = searchInput.value.trim().toLowerCase();
            const selectedKhoa = filterKhoa.value.toLowerCase();

            const filtered = allDoctors.filter(bs => {
                const id = (bs.id_bacsi || "").toLowerCase();
                const name = (bs.hoten || bs.ho_ten || "").toLowerCase();
                const dept = (bs.tenkhoa || bs.ten_khoa || "").toLowerCase();

                const matchName = (id.includes(keyword) || name.includes(keyword));
                const matchKhoa = (selectedKhoa === "" || dept === selectedKhoa);

                return matchName && matchKhoa;
            });
            renderDoctors(filtered);
        }

        filterKhoa.addEventListener("change", filterData);
        searchBtn.addEventListener("click", filterData);
        searchInput.addEventListener("keydown", e => { if (e.key === "Enter") filterData(); });

        // Init
        document.addEventListener("DOMContentLoaded", async () => {
            loadSidebar(); // Gọi hàm tải sidebar
            await loadKhoa();
            await loadDoctors();
        });
    </script>
</body>
</html>
