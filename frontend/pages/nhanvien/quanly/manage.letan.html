<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý lễ tân - DHST Hospital</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES & BASE RESET (Đã điều chỉnh để khớp với Bác sĩ) --- */
        :root{
            --primary: #2563eb; 
            --accent: #38bdf8; 
            --bg: #f4f6f9; /* Đồng bộ với trang Bác sĩ */
            --card: #fff;
            --text: #1e293b; 
            --muted: #64748b; 
            --radius: 12px; /* Đồng bộ với trang Bác sĩ */
            --shadow: 0 4px 15px rgba(0,0,0,0.05); /* Đồng bộ với trang Bác sĩ */
            --success: #10b981;
            --danger: #ef4444;
        }
        *{box-sizing:border-box;font-family:"Inter",sans-serif;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);}
        
        /* --- LAYOUT & MAIN --- */
        .main {
            margin-left: 250px; 
            padding: 30px; /* Đồng bộ với trang Bác sĩ */
            min-height: 100vh;
            transition: margin-left .3s;
        }

        /* --- HEADER & TITLE --- */
        header{
            display:flex;justify-content:space-between;align-items:center;
            margin-bottom:28px;padding-bottom:10px; border-bottom:1px solid #e2e8f0; /* Thêm border-bottom */
        }
        header h1{
            font-size:24px; /* Đồng bộ với Bác sĩ */
            font-weight:800; /* Đồng bộ với Bác sĩ */
            color:var(--primary);display:flex;align-items:center;gap:10px;
        }
        header .small{color:var(--muted); font-size:14px; font-weight:500;}

        /* --- CARD STYLES --- */
        .card{
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:24px; /* Đồng bộ với Bác sĩ */
            margin-bottom:25px;
            border: 1px solid #e2e8f0; /* Đồng bộ với Bác sĩ */
        }
        .card-header {
            display:flex; justify-content:space-between; align-items:center;
            flex-wrap:wrap; gap:15px; margin-bottom:15px; /* Điều chỉnh khoảng cách */
        }
        .card-header h2{font-size:17px;color:var(--text);display:flex;align-items:center;gap:8px;font-weight:700;}
        .card-header h2 i{color:var(--primary);}
        
        /* --- ACTIONS & FILTERS (Đồng bộ Input/Button) --- */
        .actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        
        input[type="text"] {
            padding:10px 14px; 
            border:1px solid #cbd5e1; 
            border-radius:8px; /* Đồng bộ */
            font-size:14px;
            transition: border-color .2s;
            outline:none;
            background: #fff;
            width:250px; /* Đồng bộ */
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .btn{ /* Đổi tên class từ .btn cũ sang .btn-search để đồng bộ style */
            background:var(--primary); color:#fff; border:none; border-radius:8px;
            padding:10px 18px; cursor:pointer; transition:.3s ease;
            display:flex; align-items:center; justify-content:center; gap:5px;
            font-weight:600;
        }
        .btn:hover { background: #1e40af; box-shadow: var(--shadow); }

        /* --- TABLE STYLES (Đồng bộ) --- */
        .table-wrap{overflow-x:auto;margin-top:10px;}
        table{width:100%;border-collapse:separate; border-spacing:0;}
        
        /* Table Header */
        thead th{
            background: var(--primary); /* Màu nền đậm */
            color:#fff;
            padding:12px 18px;
            text-align:left;
            font-weight:600;
            font-size:13px;
            text-transform: uppercase;
        }
        thead tr th:first-child { border-top-left-radius: 8px; }
        thead tr th:last-child { border-top-right-radius: 8px; }

        /* Table Body */
        tbody tr:nth-child(even) { background: #f8fafc; } /* Zebra stripes */
        tbody tr:hover td { background: #eef2ff; cursor: pointer; }
        tbody td{
            padding:12px 18px;
            border-bottom:1px solid #f1f5f9;
            font-size:14px;
            color: var(--text);
        }
        
        /* Border radius cho hàng cuối cùng */
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:last-child td:first-child { border-bottom-left-radius: 8px; }
        tbody tr:last-child td:last-child { border-bottom-right-radius: 8px; }

        /* Responsive */
        @media (max-width: 900px) {
            .main { margin-left: 0; padding: 20px; }
            #sidebar-placeholder { display: none; }
        }
    </style>
</head>
<body>
    
    <div id="sidebar-placeholder"></div>
    
    <main class="main">
        <header>
            <h1><i class="fas fa-concierge-bell"></i> Quản lý Lễ tân</h1>
            <div class="small">Xin chào, Admin 👋 </div>
        </header>
        
        <section class="card">
            <div class="card-header">
                <h2><i class="fas fa-list-alt"></i> Danh sách Nhân viên Lễ tân</h2>
                <div class="actions">
                    <input id="searchInput" type="text" placeholder="Nhập mã hoặc tên lễ tân...">
                    <button id="searchBtn" class="btn"><i class="fas fa-search"></i> Tìm kiếm</button>
                    </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:100px">Mã LT</th>
                            <th>Họ và tên</th>
                            <th style="width:160px">Số điện thoại</th>
                            <th style="width:250px">Email</th>
                            <th>Địa chỉ</th>
                        </tr>
                    </thead>
                    <tbody id="letanTbody">
                        <tr><td colspan="5" style="text-align:center;">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // ====== 1. SIDEBAR LOADER & EVENTS ======
        async function loadSidebar() {
            try {
                const res = await fetch('sidebar.html');
                if (res.ok) {
                    const html = await res.text();
                    document.getElementById('sidebar-placeholder').innerHTML = html;
                    initSidebarEvents();
                }
            } catch (err) { console.error("Lỗi tải sidebar:", err); }
        }

        function initSidebarEvents() {
            // Toggle Submenu
            const toggle = document.getElementById("toggleNhanVien");
            if (toggle) {
                toggle.onclick = (e) => {
                    e.preventDefault();
                    const group = toggle.closest(".submenu-group");
                    const submenu = group.querySelector(".submenu");
                    submenu.classList.toggle("show");
                    group.classList.toggle("open");
                };
            }

            // Đăng xuất
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.onclick = () => {
                    if (confirm("Bạn có chắc chắn muốn đăng xuất không?")) {
                        localStorage.clear();
                        sessionStorage.clear();
                        window.location.href = "../login.html";
                    }
                };
            }

            // Active Link & Open Submenu
            const currentPath = "manage.letan.html"; 
            const links = document.querySelectorAll('.nav a, .submenu a');
            
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && href.includes(currentPath)) {
                    link.classList.add('active');
                    
                    // Mở submenu cha nếu có
                    const submenu = link.closest('.submenu');
                    if (submenu) {
                        submenu.classList.add('show');
                        const group = submenu.closest('.submenu-group');
                        if (group) group.classList.add('open');
                    }
                }
            });
        }

        // ====== 2. BUSINESS LOGIC ======
        const API_LETAN = "http://localhost:3000/api/letan";
        const tbody = document.getElementById("letanTbody");
        const searchInput = document.getElementById("searchInput");
        const searchBtn = document.getElementById("searchBtn");
        let allLetan = [];

        async function loadLetan() {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">Đang tải dữ liệu...</td></tr>`;
            try {
                const res = await fetch(API_LETAN);
                const json = await res.json();
                allLetan = json.data || json || [];
                renderLetan(allLetan);
            } catch {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color: var(--danger);">Không thể tải dữ liệu. Vui lòng kiểm tra API.</td></tr>`;
            }
        }

        function renderLetan(list) {
            tbody.innerHTML = "";
            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color: var(--muted);">Không tìm thấy lễ tân nào.</td></tr>`;
                return;
            }
            tbody.innerHTML = list.map(lt => `
                <tr onclick="window.location.href='chitiet.letan.html?id=${lt.id_letan}'" style="cursor:pointer">
                    <td>${lt.id_letan || "N/A"}</td>
                    <td>${lt.ho_ten || "N/A"}</td>
                    <td>${lt.phone || "N/A"}</td>
                    <td>${lt.email || "N/A"}</td>
                    <td>${lt.diachi || "N/A"}</td>
                </tr>
            `).join("");
        }

        function searchLetan() {
            const kw = searchInput.value.trim().toLowerCase();
            const filtered = allLetan.filter(l => 
                (l.id_letan || "").toLowerCase().includes(kw) || 
                (l.ho_ten || "").toLowerCase().includes(kw)
            );
            renderLetan(filtered);
        }

        searchBtn.onclick = searchLetan;
        searchInput.onkeydown = e => e.key === "Enter" && searchLetan();

        // Init
        document.addEventListener("DOMContentLoaded", () => {
            loadSidebar(); // Gọi hàm load sidebar
            loadLetan();
        });
    </script>
</body>
</html>
