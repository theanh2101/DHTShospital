<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý bài viết - DHST Hospital</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{
            --primary:#2563eb; --accent:#38bdf8; --bg:#f9fafb; --card:#fff;
            --text:#1e293b; --muted:#6b7280; --radius:14px; --shadow:0 10px 30px rgba(0,0,0,0.08);
        }
        * { box-sizing:border-box; font-family:"Inter",sans-serif; margin:0; padding:0; }
        body { display:block; min-height:100vh; background:var(--bg); color:var(--text); }

        /* --- CHỈNH SỬA CSS CHO SIDEBAR LOAD ĐỘNG --- */
        /* Sidebar sẽ được load vào đây */
        #sidebar-placeholder {
            width: 250px; 
            flex-shrink: 0;
            transition: all 0.3s;
        }
        
        /* Main */
        .main { flex:1; padding:32px; overflow:auto; }

        /* Responsive */
        @media (max-width: 900px) {
            #sidebar-placeholder { display: none; }
            .main { padding: 20px; }
        }

        /* --- CÁC STYLE CŨ CỦA TRANG NEWS --- */
        header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
        header h1{font-size:26px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:10px;}
        header .small{color:var(--muted);}
        
        /* Card */
        .card{
            background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
            padding:26px;margin-bottom:30px;animation:fadeIn .4s ease;
        }
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

        /* Form elements */
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
        label{font-weight:600;font-size:14px;margin-bottom:6px;display:block;color:var(--text);}
        input,textarea,select{
            width:100%;padding:12px 14px;border:1px solid #e2e8f0;border-radius:10px;
            font-size:14px;transition:border .2s,box-shadow .2s;
        }
        input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.15);outline:none;}
        
        .btn{
            background:var(--primary);color:#fff;padding:10px 16px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all .25s;
        }
        .btn:hover{opacity:.9;transform:translateY(-2px);}
        .btn.secondary{background:#94a3b8;}
        .btn.danger{background:#ef4444;}

        /* Table */
        .table-wrap{overflow-x:auto;}
        table{width:100%;border-collapse:collapse;margin-top:10px;}
        thead th{
            background:linear-gradient(90deg,var(--primary),#1e40af);color:#fff;padding:12px 16px;text-align:left;font-weight:600;
        }
        tbody td{padding:12px 16px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
        tr:hover td{background:#f8fafc;}
        img.thumb{width:80px;height:50px;object-fit:cover;border-radius:6px;border:1px solid #eef2f7;}
        .pill{display:inline-block;padding:6px 14px;border-radius:999px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;}
        .pill.published{background:#16a34a;}
        .pill.draft{background:#6b7280;}

        /* Toast & Modal */
        .toast-wrap{position:fixed;right:24px;top:24px;z-index:90;display:flex;flex-direction:column;gap:10px;}
        .toast{background:#fff;padding:12px 16px;border-left:6px solid;border-radius:12px;box-shadow:var(--shadow);animation:fadeIn .4s ease;}
        .toast.success{border-color:#16a34a;}
        .toast.error{border-color:#ef4444;}
        
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:80;}
        .overlay.show{display:flex;}
        .modal{background:#fff;border-radius:16px;padding:22px;min-width:320px;max-width:760px;box-shadow:0 20px 45px rgba(0,0,0,0.2);}
        .modal h3{margin-bottom:10px;font-size:18px;display:flex;align-items:center;gap:8px;color:var(--text);}
        .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px;}
        .confirm-icon{width:52px;height:52px;border-radius:50%;background:#fef2f2;color:#ef4444;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;}
    </style>
</head>
<body>

    <div id="sidebar-placeholder"></div>

    <main class="main">
        <header>
            <h1><i class="fas fa-newspaper"></i> Quản lý bài viết</h1>
            <div class="small">Xin chào, Admin 👋</div>
        </header>

        <section class="card" style="display:flex;justify-content:space-between;align-items:center;gap:16px;">
            <div style="display:flex;gap:12px;align-items:center;">
                <button id="addBtn" class="btn"><i class="fas fa-plus-circle"></i> Thêm bài viết</button>
                <select id="filterCategory" style="width:220px;padding:10px;border-radius:8px;border:1px solid #e2e8f0;">
                    <option value="">Tất cả danh mục</option>
                    <option value="Tin hoạt động">Tin hoạt động</option>
                    <option value="Kiến thức Y khoa">Kiến thức Y khoa</option>
                    <option value="Lời khuyên Sức khỏe">Lời khuyên Sức khỏe</option>
                    <option value="Nghiên cứu & Đổi mới">Nghiên cứu & Đổi mới</option>
                </select>
            </div>
            <div style="display:flex;gap:10px;align-items:center;">
                <input id="searchInput" placeholder="Tìm theo tiêu đề..." style="padding:10px;border-radius:8px;border:1px solid #e2e8f0;">
                <button id="searchBtn" class="btn secondary">Tìm</button>
            </div>
        </section>

        <section class="card">
            <h2><i class="fas fa-list"></i> Danh sách bài viết</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:90px">Ảnh</th>
                            <th>Tiêu đề</th>
                            <th style="width:160px">Danh mục</th>
                            <th style="width:140px">Tác giả</th>
                            <th style="width:120px">Trạng thái</th>
                            <th style="width:160px">Ngày tạo</th>
                            <th style="width:150px">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="newsTbody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modalOverlay" class="overlay">
        <div class="modal">
            <h3 id="modalTitle"><i class="fas fa-pen"></i> Thêm bài viết</h3>
            <form id="newsForm">
                <input type="hidden" id="newsId" value="">
                <div class="grid" style="margin-top:8px;">
                    <div><label>Tiêu đề</label><input id="title" required placeholder="Tiêu đề bài viết"></div>
                    <div>
                        <label>Danh mục</label>
                        <select id="categorySelect">
                            <option value="Tin hoạt động">Tin hoạt động</option>
                            <option value="Kiến thức Y khoa">Kiến thức Y khoa</option>
                            <option value="Lời khuyên Sức khỏe">Lời khuyên Sức khỏe</option>
                            <option value="Nghiên cứu & Đổi mới">Nghiên cứu & Đổi mới</option>
                        </select>
                    </div>
                    <div style="grid-column:1/3;"><label>Tóm tắt</label><textarea id="summary" rows="2" placeholder="Mô tả ngắn..."></textarea></div>
                    <div style="grid-column:1/3;"><label>Nội dung</label><textarea id="content" rows="6" placeholder="Nội dung chi tiết..."></textarea></div>
                    <div><label>Tác giả</label><input id="author" placeholder="Tên tác giả"></div>
                    <div>
                        <label>Ảnh đại diện</label>
                        <input type="file" id="imageInput" accept="image/*">
                        <img id="imgPreview" class="thumb" style="margin-top:8px;display:none;">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancelModal" class="btn secondary">Hủy</button>
                    <button type="submit" class="btn"><i class="fas fa-save"></i> Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirmOverlay" class="overlay">
        <div class="modal">
            <div class="confirm-icon"><i class="fas fa-triangle-exclamation"></i></div>
            <h3>Xác nhận</h3>
            <p id="confirmText">Bạn có chắc muốn xóa bài viết này?</p>
            <div class="modal-actions">
                <button id="confirmCancel" class="btn secondary">Hủy</button>
                <button id="confirmOk" class="btn danger">Xóa</button>
            </div>
        </div>
    </div>
    
    <div id="toasts" class="toast-wrap"></div>

<script>
    /* ---------------- CẤU HÌNH API ---------------- */
    const API_BASE = "http://localhost:3000";
    const API_NEWS = API_BASE + "/api/news";

    /* ==============================================
       PHẦN 1: LOAD SIDEBAR TỪ FILE NGOÀI
       ============================================== */
    fetch("./sidebar.html")
    .then(response => response.text())
    .then(html => {
        document.getElementById("sidebar-placeholder").innerHTML = html;

        // --- A. Kích hoạt Active cho mục "Quản lý bài viết" ---
        const newsLink = document.querySelector('a[data-page="manage.news"]');
        if (newsLink) {
            newsLink.classList.add("active");
        }

        // --- B. Kích hoạt lại chức năng Menu con (Dropdown) ---
        // (Do script trong sidebar.html không tự chạy khi load qua fetch)
        const toggle = document.getElementById("toggleNhanVien");
        if (toggle) {
            toggle.onclick = (e) => {
                e.preventDefault();
                const group = toggle.closest(".submenu-group");
                const submenu = group.querySelector(".submenu");
                submenu.classList.toggle("show");
                group.classList.toggle("open");
            };
        }

        // --- C. Kích hoạt lại chức năng Đăng xuất ---
        const logoutBtn = document.getElementById("logoutBtn");
        if (logoutBtn) {
            logoutBtn.onclick = () => {
                if (confirm("Bạn có chắc chắn muốn đăng xuất không?")) {
                    localStorage.clear();
                    sessionStorage.clear();
                    window.location.href = "../login.html";
                }
            };
        }
    })
    .catch(err => console.error("Lỗi khi tải sidebar:", err));

    /* ==============================================
       PHẦN 2: LOGIC QUẢN LÝ BÀI VIẾT (Giữ nguyên logic cũ)
       ============================================== */
    const newsTbody = document.getElementById("newsTbody");
    const addBtn = document.getElementById("addBtn");
    const modalOverlay = document.getElementById("modalOverlay");
    const confirmOverlay = document.getElementById("confirmOverlay");
    const newsForm = document.getElementById("newsForm");
    const modalTitle = document.getElementById("modalTitle");
    const cancelModal = document.getElementById("cancelModal");
    const imgPreview = document.getElementById("imgPreview");
    const imageInput = document.getElementById("imageInput");
    const newsIdEl = document.getElementById("newsId");
    const filterCategory = document.getElementById("filterCategory");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    
    let confirmCallback = null;
    let latestNews = [];

    // --- Toast ---
    function showToast(msg, type = "success", ms = 3000){
        const t = document.createElement("div");
        t.className = "toast " + (type==="success"?"success":"error");
        t.innerHTML = `<strong>${type==="success"?"Thành công":"Lỗi"}</strong><div style="font-size:13px;margin-top:6px;">${msg}</div>`;
        document.getElementById("toasts").appendChild(t);
        setTimeout(()=> t.style.opacity = 0, ms - 600);
        setTimeout(()=> t.remove(), ms);
    }

    // --- Modal Logic ---
    function openModal(edit=false){
        modalOverlay.classList.add("show");
        if(!edit){
            modalTitle.innerHTML = '<i class="fas fa-pen"></i> Thêm bài viết';
            newsForm.reset();
            imgPreview.style.display = "none";
            newsIdEl.value = "";
            imageInput.dataset.oldImage = "";
        } else {
            modalTitle.innerHTML = '<i class="fas fa-pen"></i> Chỉnh sửa bài viết';
        }
    }
    function closeModal(){ modalOverlay.classList.remove("show"); }
    
    function openConfirm(text, cb){
        document.getElementById("confirmText").textContent = text;
        confirmOverlay.classList.add("show");
        confirmCallback = cb;
    }
    function closeConfirm(){ 
        confirmOverlay.classList.remove("show"); 
        confirmCallback = null; 
    }

    cancelModal.onclick = closeModal;
    document.getElementById("confirmCancel").onclick = closeConfirm;
    document.getElementById("confirmOk").onclick = async () => {
        if(confirmCallback) { await confirmCallback(); closeConfirm(); }
    };
    modalOverlay.onclick = (e)=>{ if(e.target===modalOverlay) closeModal(); };
    confirmOverlay.onclick = (e)=>{ if(e.target===confirmOverlay) closeConfirm(); };

    // --- Preview Image ---
    imageInput.onchange = ()=>{
        const f = imageInput.files[0];
        if(f){ 
            imgPreview.src = URL.createObjectURL(f); 
            imgPreview.style.display = "inline-block"; 
        } else { 
            imgPreview.style.display = "none"; 
        }
    };

    // --- Load Data ---
    async function loadNews(){
        newsTbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--muted)">Đang tải...</td></tr>`;
        try{
            const res = await fetch(API_NEWS);
            const data = await res.json();
            latestNews = Array.isArray(data) ? data : [];
            renderNews(latestNews);
        }catch(err){
            newsTbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#ef4444">Lỗi tải dữ liệu</td></tr>`;
        }
    }

    function renderNews(list){
        if(!list.length){
            newsTbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--muted)">Chưa có bài viết</td></tr>`;
            return;
        }
        newsTbody.innerHTML = list.map(n => {
            const id = n.id || n._id || n.id_baiviet;
            let imgUrl = "";
            if (n.image) {
                if (n.image.startsWith("data:image") || n.image.startsWith("http")) imgUrl = n.image;
                else imgUrl = API_BASE + "/" + n.image.replace(/^\/+/, "");
            }
            const status = (n.status || "draft").toLowerCase();
            return `
            <tr>
                <td><img src="${imgUrl}" class="thumb" onerror="this.style.opacity=0"></td>
                <td>${escapeHtml(n.title)}</td>
                <td>${escapeHtml(n.category)}</td>
                <td>${escapeHtml(n.author)}</td>
                <td><span class="pill ${status==='published'?'published':'draft'}" onclick="toggleStatus('${id}', '${status}')">
                    ${status==='published'?'Đã xuất bản':'Nháp'}
                </span></td>
                <td>${formatDate(n.created_at)}</td>
                <td>
                    <button class="btn secondary" onclick="openEdit('${id}')"><i class="fas fa-pen"></i></button>
                    <button class="btn danger" onclick="deleteNews('${id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        }).join("");
    }

    // --- Actions ---
    window.toggleStatus = async (id, currentStatus) => {
        const newStatus = currentStatus === "published" ? "draft" : "published";
        try{
            await fetch(`${API_NEWS}/${id}/status`, {
                method: "PATCH", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ status: newStatus })
            });
            showToast("Cập nhật trạng thái thành công");
            await loadNews();
        } catch(e){ showToast("Lỗi cập nhật", "error"); }
    };

    window.deleteNews = (id) => {
        openConfirm("Bạn có chắc muốn xóa bài viết này?", async ()=>{
            try{
                await fetch(`${API_NEWS}/${id}`, { method: "DELETE" });
                showToast("Đã xóa bài viết");
                await loadNews();
            }catch(e){ showToast("Xóa thất bại", "error"); }
        });
    };

    window.openEdit = async (id) => {
        openModal(true);
        newsIdEl.value = id;
        try {
            const res = await fetch(`${API_NEWS}/${id}`);
            const data = await res.json();
            document.getElementById("title").value = data.title || "";
            document.getElementById("categorySelect").value = data.category || "Tin hoạt động";
            document.getElementById("summary").value = data.summary || "";
            document.getElementById("author").value = data.author || "";
            document.getElementById("content").value = data.content || "";
            
            // Xử lý ảnh cũ
            imageInput.value = "";
            imageInput.dataset.oldImage = data.image || "";
            if(data.image) {
                let src = data.image.startsWith("data:") || data.image.startsWith("http") 
                    ? data.image 
                    : API_BASE + "/" + data.image;
                imgPreview.src = src;
                imgPreview.style.display = "inline-block";
            } else {
                imgPreview.style.display = "none";
            }
        } catch(e) { showToast("Lỗi tải chi tiết", "error"); }
    };

    // --- Submit Form ---
    newsForm.onsubmit = async (e) => {
        e.preventDefault();
        const id = newsIdEl.value;
        const fd = new FormData();
        fd.append("title", document.getElementById("title").value.trim());
        fd.append("category", document.getElementById("categorySelect").value);
        fd.append("summary", document.getElementById("summary").value.trim());
        fd.append("content", document.getElementById("content").value.trim());
        fd.append("author", document.getElementById("author").value.trim());
        
        const file = imageInput.files[0];
        if(file) fd.append("image", file);
        else if(imageInput.dataset.oldImage) fd.append("oldImage", imageInput.dataset.oldImage);

        try {
            const res = await fetch(id ? `${API_NEWS}/${id}` : API_NEWS, {
                method: id ? "PUT" : "POST",
                body: fd
            });
            if(!res.ok) throw new Error();
            showToast(id ? "Cập nhật thành công" : "Tạo mới thành công");
            closeModal();
            await loadNews();
        } catch(e) { showToast("Lưu thất bại", "error"); }
    };

    // --- Utils ---
    function escapeHtml(s){ return s ? String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])) : ""; }
    function formatDate(v){ return v ? new Date(v).toLocaleString("vi-VN") : "-"; }
    
    // --- Filter ---
    function applyFilter(){
        const cat = filterCategory.value.trim().toLowerCase();
        const q = searchInput.value.trim().toLowerCase();
        const list = latestNews.filter(x => 
            (cat ? (x.category||"").toLowerCase()===cat : true) && 
            (q ? (x.title||"").toLowerCase().includes(q) : true)
        );
        renderNews(list);
    }
    filterCategory.onchange = applyFilter;
    searchBtn.onclick = applyFilter;
    addBtn.onclick = () => openModal(false);

    // Init
    loadNews();
</script>
</body>
</html>
