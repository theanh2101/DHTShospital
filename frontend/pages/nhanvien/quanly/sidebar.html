<script>
document.addEventListener("DOMContentLoaded", () => {
  // === Toggle submenu ===
  const toggle = document.getElementById("toggleNhanVien");
  if (toggle) {
    toggle.addEventListener("click", e => {
      e.preventDefault();
      const group = toggle.closest(".submenu-group");
      const submenu = group.querySelector(".submenu");
      submenu.classList.toggle("show");
      group.classList.toggle("open");
    });
  }

  // === Logout ===
  const logoutBtn = document.getElementById("logoutBtn");
  if (logoutBtn) {
    logoutBtn.addEventListener("click", () => {
      if (confirm("Bạn có chắc chắn muốn đăng xuất không?")) {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = "../../login.html";
      }
    });
  }

  // === Active link tự động ===
  const currentPath = window.location.pathname; // ví dụ: /Frontend/pages/manage.account.html
  const currentPage = currentPath.substring(currentPath.lastIndexOf('/') + 1);
  
  document.querySelectorAll('.nav a, .submenu a').forEach(link => {
    const href = link.getAttribute('href');
    // So khớp mềm: chỉ cần pathname chứa tên file là được
    if (href && currentPath.includes(href)) {
      link.classList.add('active');

      // Nếu là submenu -> mở cha
      const submenu = link.closest('.submenu');
      if (submenu) {
        submenu.classList.add('show');
        const parent = submenu.closest('.submenu-group');
        if (parent) parent.classList.add('open');
      }
    }
  });

  // ✅ In ra để debug nếu vẫn chưa sáng
  console.log("currentPath:", currentPath);
});
</script>
