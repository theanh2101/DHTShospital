
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trang bác sĩ</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      background: #f5f6fa;
    }
    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: #fff;
      height: 100vh;
      padding: 20px 0;
      position: fixed;
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }
    .sidebar a {
      display: block;
      padding: 12px 20px;
      color: #fff;
      text-decoration: none;
      transition: 0.3s;
    }
    .sidebar a:hover {
      background: #34495e;
    }
    .content {
      margin-left: 220px;
      padding: 20px;
      width: 100%;
    }
    .hidden {
      display: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
    }
    table th, table td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }
    table th {
      background: #3498db;
      color: white;
    }
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Bác sĩ</h2>
    <a href="#" onclick="showSection('lich')">📅 Lịch làm việc</a>
    <a href="#" onclick="showSection('benhnhan')">👨‍⚕️ Bệnh nhân chờ khám</a>
    <a href="#" onclick="showSection('toila')">🙍‍♂️ Tôi</a>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Lịch làm việc -->
    <div id="lich" class="section">
      <h2>📅 Lịch làm việc</h2>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Ngày</th>
              <th>Ca sáng</th>
              <th>Ca chiều</th>
            </tr>
          </thead>
          <tbody id="lichlamviec">
            <!-- Lịch làm việc sẽ được load từ API -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Danh sách bệnh nhân -->
    <div id="benhnhan" class="section hidden">
      <h2>👨‍⚕️ Danh sách bệnh nhân chờ khám</h2>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Mã BN</th>
              <th>Họ tên</th>
              <th>Ngày sinh</th>
              <th>Triệu chứng</th>
              <th>Thời gian đặt</th>
            </tr>
          </thead>
          <tbody id="dsBenhNhan">
            <!-- Bệnh nhân sẽ được load từ API -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Thông tin bác sĩ -->
    <div id="toila" class="section hidden">
      <h2>🙍‍♂️ Thông tin của tôi</h2>
      <div class="card">
        <p><strong>Họ tên:</strong> <span id="tenBacSi"></span></p>
        <p><strong>Khoa:</strong> <span id="khoa"></span></p>
        <p><strong>Số điện thoại:</strong> <span id="sdt"></span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>
      </div>
    </div>
  </div>

  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(sec => sec.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    // ✅ Load dữ liệu từ API
    async function loadData() {
      try {
        // Lịch làm việc
        const lichRes = await fetch("http://localhost:3000/api/bacsi/lichlamviec");
        const lichData = await lichRes.json();
        const lichBody = document.getElementById("lichlamviec");
        lichBody.innerHTML = lichData.map(item => `
          <tr>
            <td>${item.ngay}</td>
            <td>${item.ca_sang}</td>
            <td>${item.ca_chieu}</td>
          </tr>
        `).join("");

        // Danh sách bệnh nhân
        const bnRes = await fetch("http://localhost:3000/api/bacsi/benhnhan");
        const bnData = await bnRes.json();
        const bnBody = document.getElementById("dsBenhNhan");
        bnBody.innerHTML = bnData.map(bn => `
          <tr>
            <td>${bn.id_benhnhan}</td>
            <td>${bn.ho_ten}</td>
            <td>${bn.ngay_sinh}</td>
            <td>${bn.trieu_chung}</td>
            <td>${bn.thoi_gian_dat}</td>
          </tr>
        `).join("");

        // Thông tin bác sĩ
        const meRes = await fetch("http://localhost:3000/api/bacsi/me");
        const me = await meRes.json();
        document.getElementById("tenBacSi").textContent = me.ho_ten;
        document.getElementById("khoa").textContent = me.ten_khoa;
        document.getElementById("sdt").textContent = me.so_dien_thoai;
        document.getElementById("email").textContent = me.email;
      } catch (err) {
        console.error("❌ Lỗi khi load dữ liệu:", err);
      }
    }

    loadData();

  </script>
</body>
</html>
