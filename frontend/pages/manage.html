<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>🏥 DHST Hospital Admin Dashboard</title>
  <style>
    :root {
      --primary: #007bff;
      --secondary: #0056b3;
      --light-bg: #f4f7fb;
      --card-bg: #ffffff;
      --text-dark: #333;
      --text-light: #fff;
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

    body {
      background: var(--light-bg);
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, var(--primary), var(--secondary));
      color: var(--text-light);
      padding: 25px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: fixed;
      height: 100vh;
      box-shadow: var(--shadow);
      transition: all 0.4s ease;
      z-index: 10;
    }

    .sidebar h2 {
      font-size: 22px;
      margin-bottom: 40px;
      letter-spacing: 1px;
      text-align: center;
      animation: fadeInDown 0.8s ease;
    }

    .sidebar a {
      text-decoration: none;
      color: var(--text-light);
      width: 100%;
      text-align: left;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: all 0.3s;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.25);
      transform: translateX(5px);
    }

    /* ===== Main Content ===== */
    .main {
      margin-left: 260px;
      flex: 1;
      padding: 30px;
      transition: all 0.3s;
    }

    header {
      background: var(--card-bg);
      padding: 20px 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      animation: fadeIn 1s ease;
    }

    header h1 {
      color: var(--primary);
      font-size: 24px;
      font-weight: 600;
    }

    header span {
      font-weight: 500;
      color: #555;
    }

    /* ===== Cards ===== */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(380px,1fr));
      gap: 25px;
      animation: fadeInUp 0.7s ease;
    }

    .card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .card h2 {
      font-size: 20px;
      color: var(--primary);
      margin-bottom: 15px;
      border-left: 4px solid var(--primary);
      padding-left: 10px;
    }

    /* ===== Form ===== */
    form label {
      display: block;
      margin-top: 12px;
      font-weight: 500;
    }

    form input, form select, form textarea, form button {
      width: 100%;
      padding: 10px 12px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      transition: all 0.3s;
    }

    form input:focus, form select:focus, form textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
      outline: none;
    }

    form textarea { resize: vertical; min-height: 80px; }

    form button {
      background: var(--primary);
      color: white;
      border: none;
      margin-top: 18px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    form button:hover {
      background: var(--secondary);
      transform: scale(1.02);
    }

    /* ===== Table ===== */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      border-radius: 10px;
      overflow: hidden;
    }

    table th, table td {
      padding: 12px 10px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    table th {
      background: var(--primary);
      color: white;
      font-weight: 600;
    }

    table tr:hover { background: #f9f9f9; }

    .hidden { display: none; }

    /* ===== Animations ===== */
    @keyframes fadeIn { from {opacity:0; transform:translateY(-10px);} to {opacity:1; transform:translateY(0);} }
    @keyframes fadeInUp { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
    @keyframes fadeInDown { from {opacity:0; transform:translateY(-20px);} to {opacity:1; transform:translateY(0);} }
  </style>
</head>
<body>
  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">
    <h2>🏥 DHST Hospital</h2>
    <a href="#" class="nav active" data-section="taikhoan">📋 Quản lý tài khoản</a>
    <a href="#" class="nav" data-section="news">📰 Quản lý bài viết</a>
  </div>

  <!-- ===== MAIN ===== -->
  <div class="main">
    <header>
      <h1 id="page-title">Dashboard Quản lý tài khoản</h1>
      <span>Xin chào, Admin 👋</span>
    </header>

    <!-- QUẢN LÝ TÀI KHOẢN -->
    <div id="section-taikhoan" class="section">
      <div class="cards">
        <div class="card">
          <h2>➕ Tạo tài khoản mới</h2>
          <form id="form-taikhoan">
            <label>Họ tên:</label><input type="text" name="hoten" required>
            <label>Tên đăng nhập:</label><input type="text" name="username" required>
            <label>Vai trò:</label>
            <select name="role" id="role" required>
              <option value="">-- Chọn vai trò --</option>
              <option value="BACSI">Bác sĩ</option>
              <option value="LETAN">Lễ tân</option>
              <option value="ADMIN">Quản trị</option>
            </select>
            <div id="select-khoa" style="display:none;">
              <label>Khoa:</label>
              <select name="id_khoa" id="khoa-select"></select>
            </div>
            <label>Trạng thái:</label>
            <select name="status">
              <option value="ACTIVE">Hoạt động</option>
              <option value="INACTIVE">Ngưng</option>
            </select>
            <button type="submit">💾 Tạo tài khoản</button>
          </form>
        </div>

        <div class="card">
          <h2>👥 Danh sách tài khoản</h2>
          <table id="users-table">
            <thead>
              <tr><th>ID</th><th>Họ tên</th><th>Username</th><th>Role</th><th>Khoa</th><th>Trạng thái</th></tr>
            </thead><tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- QUẢN LÝ TIN TỨC -->
    <div id="section-news" class="section hidden">
      <div class="cards">
        <div class="card">
          <h2>📝 Thêm bài viết mới</h2>
          <form id="form-news" enctype="multipart/form-data">
            <label>Tiêu đề:</label><input type="text" name="title" required>
            <label>Slug:</label><input type="text" name="slug" required>
            <label>Tóm tắt:</label><textarea name="summary"></textarea>
            <label>Nội dung:</label><textarea name="content"></textarea>
            <label>Ảnh đại diện:</label><input type="file" name="image" accept="image/*">
            <label>Tác giả:</label><input type="text" name="author">
            <label>Danh mục:</label><input type="text" name="category">
            <button type="submit">🚀 Đăng bài viết</button>
          </form>
        </div>

        <div class="card">
          <h2>📚 Danh sách bài viết</h2>
          <table id="news-table">
            <thead>
              <tr><th>ID</th><th>Tiêu đề</th><th>Tác giả</th><th>Danh mục</th><th>Ảnh</th><th>Ngày tạo</th><th>Hành động</th></tr>
            </thead><tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== SCRIPT giữ nguyên chức năng ===== -->
  <script>
    const navLinks = document.querySelectorAll(".nav");
    const sections = document.querySelectorAll(".section");
    const title = document.getElementById("page-title");

    navLinks.forEach(link => {
      link.addEventListener("click", e => {
        e.preventDefault();
        navLinks.forEach(a => a.classList.remove("active"));
        link.classList.add("active");
        sections.forEach(sec => sec.classList.add("hidden"));
        document.getElementById("section-" + link.dataset.section).classList.remove("hidden");
        title.textContent = "Dashboard " + link.textContent;
      });
    });

    const roleSelect = document.getElementById("role");
    const khoaDiv = document.getElementById("select-khoa");
    const khoaSelect = document.getElementById("khoa-select");

    roleSelect.addEventListener("change", () => {
      khoaDiv.style.display = (roleSelect.value === "BACSI") ? "block" : "none";
    });

    async function loadKhoa() {
      try {
        const res = await fetch("http://localhost:3000/api/khoa");
        const data = await res.json();
        khoaSelect.innerHTML = data.map(k => `<option value="${k.id_khoa}">${k.ten_khoa}</option>`).join("");
      } catch {}
    }
    loadKhoa();

    document.getElementById("form-taikhoan").addEventListener("submit", async e => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());
      if (data.role !== "BACSI") delete data.id_khoa;
      try {
        const res = await fetch("http://localhost:3000/api/users", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const rs = await res.json();
        if (res.ok) { loadUsers(); alert("✅ Tạo tài khoản thành công!"); } else alert(rs.error);
      } catch {}
    });

    async function loadUsers() {
      const res = await fetch("http://localhost:3000/api/accounts");
      const users = await res.json();
      const tbody = document.querySelector("#users-table tbody");
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.id_taikhoan}</td><td>${u.ho_ten||"-"}</td><td>${u.username}</td>
          <td>${u.role}</td><td>${u.ten_khoa||"-"}</td>
          <td><button onclick="toggleStatus(${u.id_taikhoan},'${u.status}')"
              style="padding:6px 12px;border:none;border-radius:5px;color:white;
              background:${u.status==="ACTIVE"?"#28a745":"#dc3545"};cursor:pointer;">
              ${u.status==="ACTIVE"?"Hoạt động":"Ngưng"}</button></td>
        </tr>`).join("");
    }

    async function toggleStatus(id, s) {
      const ns = s==="ACTIVE"?"INACTIVE":"ACTIVE";
      await fetch(`http://localhost:3000/api/accounts/${id}/status`, {
        method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:ns})
      });
      loadUsers();
    }
    loadUsers();

    const formNews = document.getElementById("form-news");
    formNews.addEventListener("submit", async e => {
      e.preventDefault();
      const fd = new FormData(formNews);
      try {
        const res = await fetch("http://localhost:3000/api/news", { method: "POST", body: fd });
        if (res.ok) { alert("✅ Đã đăng bài viết!"); formNews.reset(); loadNews(); }
        else alert("❌ Lỗi đăng bài!");
      } catch (err) { alert("❌ Lỗi server!"); }
    });

    async function loadNews() {
      const res = await fetch("http://localhost:3000/api/news");
      const news = await res.json();
      const tbody = document.querySelector("#news-table tbody");
      tbody.innerHTML = news.map(n => `
        <tr>
          <td>${n.id}</td><td>${n.title}</td><td>${n.author || "-"}</td>
          <td>${n.category || "-"}</td>
          <td>${n.image ? `<img src="http://localhost:3000${n.image}" width="70" style="border-radius:8px;">` : "-"}</td>
          <td>${new Date(n.created_at).toLocaleDateString()}</td>
          <td>
            <button onclick="deleteNews(${n.id})"
              style="background:#dc3545;color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;">
              🗑 Xóa
            </button>
          </td>
        </tr>`).join("");
    }

    async function deleteNews(id) {
      if (!confirm("Xóa bài viết này?")) return;
      await fetch(`http://localhost:3000/api/news/${id}`, { method: "DELETE" });
      loadNews();
    }
    loadNews();
  </script>
</body>
</html>
